eop:
  # Имейл където получаваш известията от ЦАИС ЕОП
  imap_server: "imap.gmail.com"
  imap_user: "your.email@gmail.com"
  imap_password: "app-password"
  sender_filter: "noreply@eop.bg"  # от кого идват шаблоните

filters:
  min_budget_bgn: 5000
  require_iso_20000_skip: true
  require_serial_numbers_skip: true
  cpv_codes:
    - "30200000"  # Компютърно оборудване
    - "30213100"  # Преносими компютри
    - "30231300"  # Монитори
    - "32322000"  # Мултимедийно оборудване
    - "38652120"  # VR очила
  keywords_include:
    - "лаптоп"
    - "монитор"
    - "интерактивен дисплей"
    - "таблет"
    - "VR"
    - "компютър"
  keywords_exclude:
    - "софтуер"  # не искаш само софтуер
    - "ремонт"
    - "поддръжка"

profitability:
  min_margin_percent: 12
  shipping_cost_percent: 2.5  # добави за доставка
  overhead_bgn: 150  # документи, КЕП, време

polycomp:
  email: "sales@polycomp.bg"
  your_company_name: "Твоята Фирма ООД"
  your_contact: "Иван Иванов, +35988..."

smtp:
  server: "smtp.gmail.com"
  port: 587
  user: "your.email@gmail.com"
  password: "app-password"